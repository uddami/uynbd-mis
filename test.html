<!DOCTYPE html>
<html>
<head><title>UYNBD MIS - Connection Test</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px}
.ok{color:green;font-weight:bold}.fail{color:red;font-weight:bold}
.box{background:#f5f5f5;border-radius:8px;padding:16px;margin:12px 0}
pre{background:#222;color:#0f0;padding:12px;border-radius:6px;font-size:13px;overflow-x:auto}
</style></head>
<body>
<h2>UYNBD MIS — Connection Test</h2>
<p>This page tests whether the backend API is reachable.</p>

<div class="box">
  <strong>Backend API status:</strong>
  <span id="status">Testing...</span>
</div>

<div class="box">
  <strong>Response:</strong>
  <pre id="response">...</pre>
</div>

<p>If status is <span class="ok">OK</span> — your backend is running. Open <a href="http://localhost:3000">http://localhost:3000</a> for the main app.</p>
<p>If status is <span class="fail">FAIL</span> — make sure <code>npm run dev</code> is running in your terminal.</p>

<script>
fetch('http://localhost:5000/health')
  .then(r => r.json())
  .then(data => {
    document.getElementById('status').innerHTML = '<span class="ok">✓ OK — Backend is running</span>';
    document.getElementById('response').textContent = JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById('status').innerHTML = '<span class="fail">✗ FAIL — Cannot reach backend</span>';
    document.getElementById('response').textContent = err.message;
  });
</script>
</body>
</html>
